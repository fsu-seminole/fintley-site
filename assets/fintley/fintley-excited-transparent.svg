<svg viewBox="40 15 160 150" xmlns="http://www.w3.org/2000/svg">
  <!-- Fintley (excited) - Alternate #1 windowpane house design, 2026 trial. transparent variant. Animated: antenna wiggle + sparkle twinkle (eyes are closed joyful arcs, no blink). -->
  <style>
    @keyframes a1-wiggle{0%,70%,100%{transform:rotate(0deg)}8%{transform:rotate(10deg)}20%{transform:rotate(-8deg)}32%{transform:rotate(5deg)}44%{transform:rotate(-2deg)}56%{transform:rotate(1deg)}}
    .antenna{transform-box:fill-box;transform-origin:50% 100%;animation:a1-wiggle 3.0s ease-in-out infinite}
    @keyframes a1-twinkle{from{transform:scale(0.7);opacity:0.5}to{transform:scale(1.1);opacity:1}}
    .spark{transform-box:fill-box;transform-origin:center;animation:a1-twinkle 0.9s ease-in-out infinite alternate}
    @media (prefers-reduced-motion: reduce){.antenna,.spark{animation:none}}
  </style>
  <g>
    <ellipse cx="120" cy="146" rx="40" ry="6.5" fill="#000000" fill-opacity="0.08"/>
    <g class="antenna">
      <path d="M120 54 L120 42" stroke="#0A6B60" stroke-width="4.5" stroke-linecap="round" fill="none"/>
      <circle cx="120" cy="37" r="6.5" fill="#F2C440"/>
    </g>
    <path d="M86 96 L120 64 L154 96 L154 130 L86 130 Z" fill="#0FA899" stroke="#0FA899" stroke-width="14" stroke-linejoin="round"/>
    <path d="M81 93 L93 96 M147 96 L159 93" stroke="#0A6B60" stroke-width="3" stroke-linecap="round" fill="none"/>
    <rect x="93" y="86" width="24" height="30" rx="9" fill="#FFFFFF" stroke="#0A6B60" stroke-width="3"/>
    <rect x="123" y="86" width="24" height="30" rx="9" fill="#FFFFFF" stroke="#0A6B60" stroke-width="3"/>
    <path d="M117 97 Q120 94 123 97" stroke="#0A6B60" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path d="M97 104 Q105 95 113 104" stroke="#0B2540" stroke-width="4" stroke-linecap="round" fill="none"/>
    <path d="M127 104 Q135 95 143 104" stroke="#0B2540" stroke-width="4" stroke-linecap="round" fill="none"/>
    <circle cx="92" cy="119" r="4.5" fill="#FF8073" fill-opacity="0.42"/><circle cx="148" cy="119" r="4.5" fill="#FF8073" fill-opacity="0.42"/>
    <path d="M109 121 L131 121 Q120 136 109 121 Z" fill="#0B2540" stroke="#0B2540" stroke-width="3" stroke-linejoin="round"/>
    <path class="spark" d="M68 92 Q69.3 98.7 76 100 Q69.3 101.3 68 108 Q66.7 101.3 60 100 Q66.7 98.7 68 92 Z" fill="#F2C440"/>
    <path class="spark" d="M172 114.5 Q173 119 177.5 120 Q173 121 172 125.5 Q171 121 166.5 120 Q171 119 172 114.5 Z" fill="#F2C440"/>
  </g>
</svg>
