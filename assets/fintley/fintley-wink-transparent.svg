<svg viewBox="40 15 160 150" xmlns="http://www.w3.org/2000/svg">
  <!-- Fintley (wink) - Alternate #1 windowpane house design, 2026 trial. transparent variant, -4deg tilt. Animated: antenna wiggle + left-eye blink + star twinkle. -->
  <style>
    @keyframes a1-wiggle{0%,70%,100%{transform:rotate(0deg)}8%{transform:rotate(9deg)}20%{transform:rotate(-7deg)}32%{transform:rotate(4deg)}44%{transform:rotate(-2deg)}56%{transform:rotate(1deg)}}
    .antenna{transform-box:fill-box;transform-origin:50% 100%;animation:a1-wiggle 3.4s ease-in-out infinite}
    @keyframes a1-blink{0%,91%,100%{transform:scaleY(1)}94%{transform:scaleY(0.08)}97%{transform:scaleY(1)}}
    .blink{transform-box:fill-box;transform-origin:center;animation:a1-blink 4.8s linear infinite}
    @keyframes a1-twinkle{from{transform:scale(0.7);opacity:0.5}to{transform:scale(1.1);opacity:1}}
    .spark{transform-box:fill-box;transform-origin:center;animation:a1-twinkle 0.9s ease-in-out infinite alternate}
    @media (prefers-reduced-motion: reduce){.antenna,.blink,.spark{animation:none}}
  </style>
  <g transform="rotate(-4 120 100)">
    <ellipse cx="120" cy="146" rx="40" ry="6.5" fill="#000000" fill-opacity="0.08"/>
    <g class="antenna">
      <path d="M120 54 L120 42" stroke="#0A6B60" stroke-width="4.5" stroke-linecap="round" fill="none"/>
      <circle cx="120" cy="37" r="6.5" fill="#F2C440"/>
    </g>
    <path d="M86 96 L120 64 L154 96 L154 130 L86 130 Z" fill="#0FA899" stroke="#0FA899" stroke-width="14" stroke-linejoin="round"/>
    <path d="M81 93 L93 96 M147 96 L159 93" stroke="#0A6B60" stroke-width="3" stroke-linecap="round" fill="none"/>
    <rect x="93" y="86" width="24" height="30" rx="9" fill="#FFFFFF" stroke="#0A6B60" stroke-width="3"/>
    <rect x="123" y="86" width="24" height="30" rx="9" fill="#FFFFFF" stroke="#0A6B60" stroke-width="3"/>
    <path d="M117 97 Q120 94 123 97" stroke="#0A6B60" stroke-width="3" stroke-linecap="round" fill="none"/>
    <g class="blink"><circle cx="105" cy="102" r="6" fill="#0B2540"/><circle cx="102" cy="98.5" r="2.4" fill="#FFFFFF"/><circle cx="108" cy="105" r="1.3" fill="#FFFFFF" fill-opacity="0.9"/></g>
    <path d="M127 103 Q135 95 143 103" stroke="#0B2540" stroke-width="4" stroke-linecap="round" fill="none"/>
    <circle cx="92" cy="119" r="4.5" fill="#FF8073" fill-opacity="0.42"/><circle cx="148" cy="119" r="4.5" fill="#FF8073" fill-opacity="0.42"/>
    <path d="M108 125 Q122 133 134 123" stroke="#0B2540" stroke-width="4.5" stroke-linecap="round" fill="none"/>
    <path class="spark" d="M170 54 Q171.6 62.4 180 64 Q171.6 65.6 170 74 Q168.4 65.6 160 64 Q168.4 62.4 170 54 Z" fill="#F2C440" stroke="#0B2540" stroke-width="3" stroke-linejoin="round"/>
    <path class="spark" d="M176 88.5 Q177 93 181.5 94 Q177 95 176 99.5 Q175 95 170.5 94 Q175 93 176 88.5 Z" fill="#F2C440"/>
  </g>
</svg>
